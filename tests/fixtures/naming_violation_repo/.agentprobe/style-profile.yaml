naming:
  functions: camelCase
  classes: PascalCase
  files: kebab-case
  constants: UPPER_SNAKE_CASE

imports:
  order: [builtin, external, internal, relative]
  max_depth: 3

patterns:
  error_handling: try-catch-with-typed-errors

forbidden:
  - console.log-in-production-code
  - any-type-in-typescript
