thresholds:
  block: 70
  warn: 40

weights:
  architecture: 0.40
  pattern: 0.25
  regression: 0.35

regression:
  critical_dirs: ["src/payments", "src/auth"]
  max_llm_calls_per_pr: 20
  timing_divergence_threshold: 0.20

cache:
  backend: memory
  ttl_seconds: 86400

llm:
  provider: ollama
  model: llama3
  base_url: "http://localhost:11434"
